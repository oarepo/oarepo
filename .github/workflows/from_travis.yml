name: Oarepo build script ported from travis

on:
  push:
    branches: ["rdm-14"]
    tags: ["*"]
  pull_request:
    branches: ["rdm-14"]
  workflow_dispatch:

env:
  PIP_EXTRA_INDEX_URL: https://gitlab.cesnet.cz/api/v4/projects/1408/packages/pypi/simple
  UV_EXTRA_INDEX_URL: https://gitlab.cesnet.cz/api/v4/projects/1408/packages/pypi/simple

permissions:
  contents: write

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.14"]
        db-service: [postgresql16]
        search-service: [opensearch2]
    env:
      SEARCH: ${{ matrix.search-service }}
      DB: ${{ matrix.db-service }}
      ES_HOST: 127.0.0.1
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://invenio:invenio@localhost:5432/invenio"
      POSTGRES_USER: invenio
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: invenio
      POSTGRES_PASS: invenio
      OAR_BOT: "${{ secrets.OAR_BOT }}"
    steps:
      - name: Checkout oarepo/oarepo
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Set up Python ver.${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          # This path is specific to Ubuntu
          path: ~/.cache/pip
          # Look to see if there is a cache hit for the corresponding requirements file
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Configure sysctl limits
        run: |
          sudo swapoff -a
          sudo sysctl -w vm.swappiness=1
          sudo sysctl -w fs.file-max=262144
          sudo sysctl -w vm.max_map_count=262144

      - name: Before_install
        run: |
          pip install --upgrade pip setuptools twine wheel docker-services-cli

      - name: Install
        run: |
          pip install --force-reinstall -e .[tests]

      - name: Run-tests
        run: |
          /bin/bash ./run-tests.sh

      - name: Build package to publish
        run: |
          python setup.py sdist bdist_wheel

      - name: Debug
        run: |
          echo "event_name:${{ github.event_name }}; ref:${{ github.ref }}"

      - name: Publish package
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        env:
          TWINE_USERNAME: ${{ secrets.TWINE_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.TWINE_PASSWORD }}
          CESNET_GITLAB_PYPI_URL: "https://gitlab.cesnet.cz/api/v4/projects/1408/packages/pypi"
        shell: bash
        run: |
          twine upload --verbose --repository-url ${CESNET_GITLAB_PYPI_URL} dist/*

      - name: Create and push repository tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        shell: bash
        run: |
          PACKAGE_VERSION="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"
          TARGET_TAG="v${PACKAGE_VERSION}"

          if [ "${GITHUB_REF_NAME}" = "${TARGET_TAG}" ]; then
            echo "Current ref already matches ${TARGET_TAG}, nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "${TARGET_TAG}" >/dev/null 2>&1; then
            echo "Tag ${TARGET_TAG} already exists locally."
          else
            git tag "${TARGET_TAG}" "${GITHUB_SHA}"
          fi

          git push origin "refs/tags/${TARGET_TAG}" -o ci.skip
